<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Restricted | Massillon City Schools</title>
    <style>
        :root { --m-orange: #FF6600; --m-black: #000000; --m-gray: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: radial-gradient(circle, #333 0%, #000 100%); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #333; }
        .card { background: white; width: 90%; max-width: 550px; border-radius: 20px; overflow: hidden; border-top: 12px solid var(--m-orange); box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .header { background: var(--m-black); padding: 30px; color: white; text-align: center; }
        .logo { font-size: 2.5rem; font-weight: 900; color: var(--m-orange); letter-spacing: 2px; }
        .content { padding: 30px; text-align: center; }
        .aup { background: #fff5f5; border-left: 5px solid #c0392b; padding: 15px; margin-bottom: 20px; text-align: left; font-size: 0.85rem; color: #721c24; }
        .info-box { background: var(--m-gray); border-radius: 12px; padding: 15px; text-align: left; margin-bottom: 20px; border: 1px solid #ddd; }
        .info-row { display: flex; border-bottom: 1px solid #e0e0e0; padding: 6px 0; font-size: 0.8rem; }
        .info-row:last-child { border-bottom: none; }
        .label { font-weight: bold; width: 100px; color: #666; text-transform: uppercase; flex-shrink: 0; }
        .val { color: #000; font-family: 'Courier New', monospace; word-break: break-all; font-weight: bold; }
        .btn { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, var(--m-orange), #e65c00); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,102,0,0.3); }
        .btn:hover { transform: translateY(-2px); background: var(--m-black); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo">MASSILLON</div>
        <div style="font-size: 0.8rem; letter-spacing: 2px; color: #aaa;">CITY SCHOOL DISTRICT</div>
    </div>
    <div class="content">
        <h2 style="margin: 0 0 10px 0;">Content Restricted</h2>
        <div class="aup"><strong>AUP NOTICE:</strong> Bypassing security filters is a violation of the Massillon City Schools Acceptable Use Policy.</div>
        
        <div class="info-box">
            <div class="info-row"><span class="label">URL:</span><span class="val" id="url-v">---</span></div>
            <div class="info-row"><span class="label">Category:</span><span class="val" id="cat-v">---</span></div>
            <div class="info-row"><span class="label">User:</span><span class="val" id="user-v">---</span></div>
            <div class="info-row"><span class="label">Client IP:</span><span class="val" id="ip-v">---</span></div>
        </div>

        <button onclick="history.back()" class="btn">Return to Safety</button>
    </div>
</div>

<script>
    // Robust URL parameter puller
    function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name) || "Unavailable";
    }

    // Populate the fields as soon as the page loads
    window.onload = function() {
        document.getElementById('url-v').textContent = getQueryParam('u');
        document.getElementById('cat-v').textContent = getQueryParam('c');
        document.getElementById('user-v').textContent = getQueryParam('e');
        document.getElementById('ip-v').textContent = getQueryParam('i');
    };
</script>

</body>
</html>
